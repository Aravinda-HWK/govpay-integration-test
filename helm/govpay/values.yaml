image:
  repository: ghcr.io/<owner>/govpay-integration-test
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8080

env:
  GOVPAY_ADDR: ":8080"
  GOVPAY_TOKEN_TTL_SECONDS: "3600"

route:
  enabled: true
  host: ""

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
