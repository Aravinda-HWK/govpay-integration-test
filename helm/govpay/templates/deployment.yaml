apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: govpay
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: GOVPAY_ADDR
              value: {{ .Values.env.GOVPAY_ADDR | quote }}
            - name: GOVPAY_BASIC_USER
              value: {{ .Values.env.GOVPAY_BASIC_USER | quote }}
            - name: GOVPAY_BASIC_PASS
              value: {{ .Values.env.GOVPAY_BASIC_PASS | quote }}
            - name: GOVPAY_TOKEN_TTL_SECONDS
              value: {{ .Values.env.GOVPAY_TOKEN_TTL_SECONDS | quote }}
            {{- with .Values.idp.tokenURL }}
            - name: GOVPAY_IDP_TOKEN_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.idp.jwksURL }}
            - name: GOVPAY_IDP_JWKS_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.idp.issuer }}
            - name: GOVPAY_IDP_ISSUER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.idp.audience }}
            - name: GOVPAY_IDP_AUDIENCE
              value: {{ . | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
